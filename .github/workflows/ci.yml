name: CI

on:
  push:
  pull_request:

jobs:
  crypto-core:
    name: crypto-core — blocking (TESTING.md §1)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      # libsodium is vendored by swift-sodium (xcframework) — no system install needed.
      - name: Run crypto suite
        working-directory: crypto-core/swift
        run: swift run CryptoCoreTests

  ios-app:
    name: iOS app shell builds (simulator)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build for iOS Simulator
        working-directory: ios
        run: >
          xcodebuild -project Souvenir.xcodeproj -scheme Souvenir
          -sdk iphonesimulator -configuration Debug
          CODE_SIGNING_ALLOWED=NO build

  invariants:
    name: invariants — blocking (TESTING.md §2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Run invariant + authorization suites
        working-directory: backend
        run: node --test
